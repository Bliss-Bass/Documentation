name: Publish BlissOS Docs to GitHub Pages
on:
  workflow_dispatch:
  push:
    branches:
      - main
      
jobs:
  publish:
    name: Publish to docs branch

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2

      - uses: actions/setup-dotnet@v1
        with:
          dotnet-version: 7.0.x

      # Pinned to v4.5.3: Retype v4.6.0 crashes during the deploy phase with
      # "Operations that change non-concurrent collections must have exclusive access"
      # (race in AbstractOutputTracker). Re-evaluate when a fixed release ships.
      - uses: retypeapp/action-build@v4.5.3

      - uses: retypeapp/action-github-pages@v4.5.3
        with:
          branch: docs
          update-branch: true
