# =========================================================================
# /data/misc/settings_global.conf
# Global Android settings configuration for vendor_ax86-lite.
# Lines starting with '#' or empty lines are ignored.
# Format: key=value
#
# To use: Push this file to /data/misc/settings_global.conf and trigger update.
# =========================================================================

# --- Developer Options ---
development_settings_enabled=1
adb_enabled=1
adb_wifi_enabled=1

# --- Power & Multi-Display ---
stay_on_while_plugged_in=3
force_desktop_mode_on_external_displays=1
force_allow_on_external=1

# --- Time & Connectivity ---
time_zone=America/New_York
# Use airplane_mode_radios to force disable all radios
# airplane_mode_radios=cell,wifi,bluetooth,nfc,wimax
# airplane_mode_on=1