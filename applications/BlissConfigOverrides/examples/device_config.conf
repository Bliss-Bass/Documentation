# =========================================================================
# /data/misc/device_config.conf
# Dynamic device_config properties for vendor_ax86-lite.
# Lines starting with '#' or empty lines are ignored.
# Format: namespace/key=value
#
# To use: Push this file to /data/misc/device_config.conf and trigger update.
# =========================================================================

# --- Desktop Windowing / PC Mode Flags ---
lse_desktop_experience/com.android.window.flags.enable_desktop_windowing=true
lse_desktop_experience/com.android.window.flags.enable_desktop_windowing_persistence=true
lse_desktop_experience/com.android.window.flags.enable_desktop_windowing_app_to_web=true
lse_desktop_experience/com.android.window.flags.enable_desktop_windowing_modals_policy=true
lse_desktop_experience/com.android.window.flags.enable_desktop_swipe_back_minimize_animation_bugfix=true

# --- Multi-Display Windowing Flags ---
lse_desktop_experience/com.android.window.flags.enable_desktop_ime_bugfix=true
lse_desktop_experience/com.android.window.flags.enable_display_disconnect_interaction=true
lse_desktop_experience/com.android.window.flags.enable_display_focus_in_shell_transitions=true
lse_desktop_experience/com.android.window.flags.enable_display_reconnect_interaction=true

# --- Desktop Experience / UI ---
lse_desktop_experience/com.android.window.flags.enable_drag_to_maximize=true
lse_desktop_experience/com.android.window.flags.enable_desktop_launcher=true
lse_desktop_experience/com.android.window.flags.enable_presentation_for_connected_displays=true