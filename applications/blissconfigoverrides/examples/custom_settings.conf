# =========================================================================
# /data/misc/custom_settings.conf
# Global Android settings configuration for vendor_ax86-lite.
# Lines starting with '#' or empty lines are ignored.
#
# To use: Push this file to /data/misc/custom_settings.conf and reboot.
# =========================================================================

# Device Name (Shown in Bluetooth, Cast, and About Phone)
device_name=Bliss OS x86 Kiosk

# Locale Settings (Injected into build.prop during early-boot)
language=en
region=US

# Time and Date Formats
# time_format: 12 or 24
time_format=24
# date_format: e.g., MM-dd-yyyy, dd/MM/yyyy, yyyy-MM-dd
date_format=MM-dd-yyyy

# Display Settings
# screen_brightness: 0 to 255
screen_brightness=128
# display_timeout: time in milliseconds before screen turns off (e.g. 60000 = 1 minute, 2147483647 = basically never)
display_timeout=60000

# Input Method (Keyboard) Management
# Format is package.name/.ServiceName
ime_management=com.android.inputmethod.latin/.LatinIME

# Lock Screen Notifications
# 1 = Show all, 0 = Don't show notifications at all
notifications_enabled=1