# =========================================================================
# /data/misc/settings_system.conf
# System Android settings configuration for vendor_ax86-lite.
# Lines starting with '#' or empty lines are ignored.
# Format: key=value
#
# To use: Push this file to /data/misc/settings_system.conf and trigger update.
# =========================================================================

# --- Display & UI ---
# Screen brightness ranges from 0 to 255
screen_brightness=128
# Screen off timeout in milliseconds
screen_off_timeout=60000
# Sleep timeout in milliseconds
sleep_timeout=86400000
# Lock device rotation
accelerometer_rotation=0

# --- Time & Formatting ---
time_12_24=24